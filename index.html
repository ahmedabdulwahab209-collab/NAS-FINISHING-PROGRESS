
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    background:#0f0f0f;
    color:#fff;
    margin:0;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    border:2px solid #fff;
    padding:20px;
    margin-bottom:15px;
    background:#000;
}

.title{
    font-size:42px;   /* 🔥 اسم الشركة أكبر */
    font-weight:bold;
    letter-spacing:1px;
}

.sub{
    font-weight:bold;
    color:#ccc;
}

/* NOTE */
.note{
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
    color:#aaa;
}

/* CONTROLS */
.controls{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

button, select{
    padding:10px;
    border:2px solid #fff;
    background:#000;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#fff;
    color:#000;
}

/* MAIN GRID */
.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

/* CARDS */
.card{
    border:2px solid #fff;
    padding:15px;
    background:#111;
}

/* TEXT ITEMS */
.item{
    display:flex;
    justify-content:space-between;
    margin:5px 0;
    color:#ddd;
}

/* PROGRESS BAR */
.bar{
    height:8px;
    background:#fff;
    margin-bottom:8px;
}

/* CHART */
canvas{
    border:2px solid #fff;
    padding:10px;
    background:#111;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:20px;
    font-weight:bold;
    color:#aaa;
}

@media(max-width:900px){
    .container{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="header">
    <div class="title">شركة ناس</div>
    <div class="sub">KHG | شركة الخليفة القابضة</div>
</div>

<div class="note">
خاص بقسم التشطيبات - شركة ناس
</div>

<div class="controls">
    <select id="siteSelect"></select>
    <button onclick="exportCSV()">Export CSV</button>
</div>

<div class="container">

<div class="card" id="dataBox"></div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<div class="footer">
إعداد مهندس / أحمد عبدالوهاب - إدارة المكتب الفني
</div>

<script>

const data = {
"Site 140":{
"Building 1":{"Plaster":70,"Block":80,"GRC":60,"Sandblast":50,"Paint":65,"Marble":40,"Plumbing":55,"Electrical":60},
"Building 3":{"Block":70,"Plaster":60,"Paint":50,"Gypsum":40,"Ceramic":55,"Marble":45,"Glass":30},
"Building 4":{"Block":65,"Plaster":60,"Paint":50,"Gypsum":40,"Ceramic":55,"Marble":45,"Glass":30},
"Building 7":{"Block":80,"Plaster":75,"Marble":60,"Ceramic":55,"Gypsum":50,"Plumbing":45,"Electrical":40}
},

"Site 180":{
"F2":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60},
"F3":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60},
"B":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60},
"CL":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60}
},

"Site 13":{
"Main":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60}
},

"Cafe 114-C":{
"Main":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60,"CurtainWall":30}
},

"Site 171":{
"Villa":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60}
},

"Site 165":{
"Lab":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60,"LabSupply":35}
}

};

const siteSelect=document.getElementById("siteSelect");
const box=document.getElementById("dataBox");

let chart;

function init(){

for(let s in data){
siteSelect.innerHTML+=`<option>${s}</option>`;
}

load(siteSelect.value);

siteSelect.onchange=()=>load(siteSelect.value);

}

function avg(obj){
let sum=0,c=0;
for(let i in obj){sum+=obj[i];c++;}
return Math.round(sum/c);
}

function load(site){

let html="";
let labels=[];
let values=[];

for(let b in data[site]){

let a=avg(data[site][b]);

labels.push(b);
values.push(a);

html+=`
<h3>${b} (Avg ${a}%)</h3>
`;

for(let i in data[site][b]){
html+=`
<div class="item"><span>${i}</span><span>${data[site][b][i]}%</span></div>
<div class="bar" style="width:${data[site][b][i]}%"></div>
`;
}

}

box.innerHTML=html;

drawChart(labels,values);

}

function drawChart(labels,values){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Progress %",
data:values,
backgroundColor:"#fff"
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
y:{beginAtZero:true,max:100}
}
}
});

}

function exportCSV(){

let csv="Site,Building,Item,Progress\n";

for(let s in data){
for(let b in data[s]){
for(let i in data[s][b]){
csv+=`${s},${b},${i},${data[s][b][i]}\n`;
}
}
}

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="progress.csv";
a.click();

}

init();

</script>

</body>
</html>
