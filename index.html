
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    color:#111;
    margin:0;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    border:2px solid #000;
    padding:20px;
    margin-bottom:15px;
    background:#fff;
}

.title{
    font-size:42px;
    font-weight:bold;
    color:#000;
}

.sub{
    font-weight:bold;
    color:#444;
}

.note{
    text-align:center;
    margin-bottom:15px;
    color:#555;
    font-weight:bold;
}

/* CONTROLS */
.controls{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

button, select{
    padding:10px;
    border:2px solid #000;
    background:#fff;
    color:#000;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    background:#000;
    color:#fff;
}

/* MAIN GRID */
.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

/* CARD */
.card{
    border:2px solid #000;
    padding:15px;
    background:#fff;
}

/* ITEM */
.item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:10px 0;
    gap:10px;
}

.item-header{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    color:#111;
}

/* BAR */
.bar{
    height:6px;
    background:#000;
    margin-top:4px;
}

/* CIRCLE */
.circle{
    width:45px;
    height:45px;
    transform:rotate(-90deg);
}

.circle-bg{
    fill:none;
    stroke:#ddd;
    stroke-width:4;
}

.circle-progress{
    fill:none;
    stroke:#000;
    stroke-width:4;
    stroke-linecap:round;
}

/* CHART */
canvas{
    border:2px solid #000;
    background:#fff;
    padding:10px;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:20px;
    color:#444;
    font-weight:bold;
}

@media(max-width:900px){
    .container{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="header">
    <div class="title">شركة ناس</div>
    <div class="sub">KHG | شركة الخليفة القابضة</div>
</div>

<div class="note">
خاص بقسم التشطيبات - شركة ناس
</div>

<div class="controls">
    <select id="siteSelect"></select>
    <button onclick="exportCSV()">Export CSV</button>
</div>

<div class="container">

<div class="card" id="dataBox"></div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<div class="footer">
Prepared By Eng / Ahmed Abdulwahab - Technical Office Department
</div>

<script>

const data = {
"Site 140":{
"Building 1":{"Plaster":70,"Block":80,"GRC":60,"Sandblast":50,"Paint":65,"Marble":40,"Plumbing":55,"Electrical":60},
"Building 3":{"Block":70,"Plaster":60,"Paint":50,"Gypsum":40,"Ceramic":55,"Marble":45,"Glass":30},
"Building 4":{"Block":65,"Plaster":60,"Paint":50,"Gypsum":40,"Ceramic":55,"Marble":45,"Glass":30},
"Building 7":{"Block":80,"Plaster":75,"Marble":60,"Ceramic":55,"Gypsum":50,"Plumbing":45,"Electrical":40}
},

"Site 180":{
"F2":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60},
"F3":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60},
"B":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60},
"CL":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60}
},

"Site 13":{
"Main":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60}
},

"Cafe 114-C":{
"Main":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60,"CurtainWall":30}
},

"Site 171":{
"Villa":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60}
},

"Site 165":{
"Lab":{"Ceramic":60,"Marble":50,"Plaster":70,"Paint":60,"Gypsum":40,"Plumbing":50,"Electrical":60,"LabSupply":35}
}

};

const siteSelect=document.getElementById("siteSelect");
const box=document.getElementById("dataBox");
let chart;

function init(){

for(let s in data){
siteSelect.innerHTML+=`<option>${s}</option>`;
}

load(siteSelect.value);
siteSelect.onchange=()=>load(siteSelect.value);

}

function avg(obj){
let sum=0,c=0;
for(let i in obj){sum+=obj[i];c++;}
return Math.round(sum/c);
}

function item(name,value){

const radius = 16;
const circumference = 2 * Math.PI * radius;

return `
<div class="item">

    <div style="flex:1;">

        <div class="item-header">
            <span>${name}</span>
            <span>${value}%</span>
        </div>

        <div class="bar" style="width:${value}%"></div>

    </div>

    <svg class="circle" viewBox="0 0 40 40">
        <circle class="circle-bg" cx="20" cy="20" r="${radius}"></circle>
        <circle class="circle-progress"
            cx="20" cy="20" r="${radius}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference - (value/100)*circumference}">
        </circle>
    </svg>

</div>
`;
}

function load(site){

let html="";
let labels=[];
let values=[];

for(let b in data[site]){

let a=avg(data[site][b]);

labels.push(b);
values.push(a);

html+=`<h3>${b} (Avg ${a}%)</h3>`;

for(let i in data[site][b]){
html+=item(i,data[site][b][i]);
}

}

box.innerHTML=html;
drawChart(labels,values);

}

function drawChart(labels,values){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Progress",
data:values,
backgroundColor:"#000"
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true,max:100}}
}
});

}

function exportCSV(){

let csv="Site,Building,Item,Progress\n";

for(let s in data){
for(let b in data[s]){
for(let i in data[s][b]){
csv+=`${s},${b},${i},${data[s][b][i]}\n`;
}
}
}

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="progress.csv";
a.click();

}

init();

</script>

</body>
</html>
